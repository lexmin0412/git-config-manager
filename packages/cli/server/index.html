<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
	<head>
		<title>CLI Browser Interaction</title>
		<script src="https://unpkg.com/@tailwindcss/browser@4"></script>
	</head>
	<body>
		<div class="p-6 max-w-7xl mx-auto">
			<h1 class="text-2xl font-semibold text-gray-700 mb-6">GCM 冲突处理</h1>

			<div class="flex items-start gap-4 w-full h-96">
				<div class="flex-1 h-full flex flex-col">
					<h3 class="text-lg font-medium text-gray-700 mb-2">本地配置</h3>
					<textarea
						id="localConfig"
						class="w-full flex-1 p-4 rounded-lg border border-gray-200 shadow-sm bg-gray-50 focus:ring-2 focus:ring-blue-100 focus:border-blue-300 focus:outline-none transition-all duration-200"
					></textarea>
				</div>
				<div class="flex-1 h-full flex flex-col">
					<h3 class="text-lg font-medium text-gray-700 mb-2">远程配置</h3>
					<textarea
						id="remoteConfig"
						class="w-full flex-1 p-4 rounded-lg border border-gray-200 shadow-sm bg-gray-50 focus:ring-2 focus:ring-blue-100 focus:border-blue-300 focus:outline-none transition-all duration-200"
					></textarea>
				</div>
			</div>

			<div class="mt-8">
				<div class="flex items-center mb-3">
					<h3 class="text-lg font-medium text-gray-700 mb-2 flex-1">
						合并后配置 (JSON 格式)
					</h3>
					<div class="flex gap-2">
						<button class="px-3 py-1 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded text-sm transition-colors" id="use_local_btn">以本地为准</button>
						<button class="px-3 py-1 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded text-sm transition-colors" id="use_remote_btn">以远程为准</button>
						<button class="px-3 py-1 bg-blue-500 hover:bg-blue-600 text-white rounded text-sm transition-colors font-medium ml-4" id="submit_btn">确认提交</button>
					</div>
				</div>
				<textarea
					id="mergedConfig"
					placeholder="在此编辑最终合并后的配置..."
					class="w-full h-96 p-4 font-mono text-sm rounded-lg border border-gray-200 shadow-sm bg-white focus:ring-2 focus:ring-blue-100 focus:border-blue-300 focus:outline-none transition-all duration-200"
				></textarea>
			</div>
		</div>

		<script>
			// 初始化逻辑
			window.addEventListener('load', () => {
				const localArea = document.querySelector('#localConfig');
				const remoteArea = document.querySelector('#remoteConfig');
				const mergedArea = document.querySelector('#mergedConfig');
				
				// 监听按钮点击
				document.querySelector('#use_local_btn').addEventListener('click', () => {
					mergedArea.value = localArea.value;
				});

				document.querySelector('#use_remote_btn').addEventListener('click', () => {
					mergedArea.value = remoteArea.value;
				});

				// 默认尝试智能合并 (去重合并)
				setTimeout(() => {
					try {
						const local = JSON.parse(localArea.value || '[]');
						const remote = JSON.parse(remoteArea.value || '[]');
						
						// 以 alias 为唯一键进行合并
						const map = new Map();
						[...remote, ...local].forEach(item => {
							if (item.alias) map.set(item.alias, item);
						});
						
						const merged = Array.from(map.values());
						mergedArea.value = JSON.stringify(merged, null, 2);
					} catch (e) {
						console.error('自动合并失败', e);
					}
				}, 500);
			});
		</script>
	</body>
</html>
